server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|wasm|png|jpe?g|svg|ico|json|otf|ttf)$ {
        try_files $uri =404;
        expires 1h;
        access_log off;
    }
}
